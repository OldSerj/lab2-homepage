<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <header>
        <h1>Contact Us</h1>
        <nav aria-label="Main navigation">
            <ul>
                <li><a href="index.html">Home</a></li>
            </ul>
        </nav>
    </header>

    <main id="main-content">
        <form aria-label="Contact form">
            <fieldset>
                <legend>Your Details</legend>
                <div>
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div>
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div>
                    <label for="phone">Phone (optional):</label>
                    <input type="tel" id="phone" name="phone" aria-describedby="phone-help">
                    <span id="phone-help">Please include country code if outside the UK.</span>
                </div>
            </fieldset>

            <fieldset>
                <legend>Your Message</legend>
                <div>
                    <label for="subject">Subject:</label>
                    <input type="text" id="subject" name="subject" required>
                </div>
                <div>
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="4" required></textarea>
                </div>
            </fieldset>

            <fieldset>
                <legend>How did you hear about us?</legend>
                <div>
                    <input type="radio" id="friend" name="source" value="friend">
                    <label for="friend">From a friend</label>
                </div>
                <div>
                    <input type="radio" id="search" name="source" value="search">
                    <label for="search">Search engine</label>
                </div>
                <div>
                    <input type="radio" id="social" name="source" value="social">
                    <label for="social">Social media</label>
                </div>
                <div>
                    <input type="radio" id="other" name="source" value="other">
                    <label for="other">Other</label>
                </div>
            </fieldset>

            <div>
                <button type="submit">Submit</button>
            </div>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 OldSerj. All rights reserved.</p>
    </footer>
</body>
</html>
